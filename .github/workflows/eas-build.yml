name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        type: choice
        options:
          - android
          - ios
          - all
        default: all
      profile:
        description: Build profile
        required: true
        type: choice
        options:
          - development
          - preview
          - production
        default: preview

jobs:
  build:
    name: EAS Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile == 'production' && 'production' || inputs.profile == 'preview' && 'staging' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
